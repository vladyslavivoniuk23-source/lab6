<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lights Out Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Lights Out</h1>
        
        <div class="stats">
            <p>Рівень: <span id="lvl-id">-</span></p>
            <p>Ціль: <span id="target-moves">0</span></p>
            <p>Кроки: <span id="move-count">0</span></p>
        </div>

        <div id="game-board" class="grid-container"></div>
        
        <h2 id="status"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
