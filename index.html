<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lab 6 - Lights On</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; color: #333; }
        
        /* Сітка гри */
        #game-board { 
            display: inline-grid; 
            grid-template-columns: repeat(5, 50px); 
            gap: 5px; 
            margin-top: 20px;
        }

        /* Клітинки */
        .cell { 
            width: 50px; 
            height: 50px; 
            border: 1px solid #999; 
            cursor: pointer; 
        }
        
        /* Стан увімкнено/вимкнено */
        .on { background: #ffd700; } /* Жовтий */
        .off { background: #eee; }    /* Сірий */

        .info { margin: 10px 0; }
        #status { font-weight: bold; color: green; margin-top: 15px; }
        button.reload { margin-top: 20px; padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Lights On</h2>

    <div class="info">
        Рівень: <span id="lvl-id"></span> | 
        Ціль: <span id="target-moves"></span> | 
        Ходи: <span id="move-count">0</span>
    </div>

    <div id="game-board"></div>

    <div id="status"></div>

    <button class="reload" onclick="location.reload()">Скинути</button>

    <script src="script.js"></script>
</body>
</html>
